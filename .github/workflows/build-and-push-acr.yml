name: Build and Push to ACR

on:
  push:
    branches: [ main, josh-docker ]
  workflow_dispatch:

env:
  IMAGE_NAME: team4-back-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER_JOSH }}
          username: ${{ secrets.ACR_USERNAME_JOSH }}
          password: ${{ secrets.ACR_PASSWORD_JOSH }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER_JOSH }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER_JOSH }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER_JOSH }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER_JOSH }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      - name: Log successful push
        run: |
          echo "✅ Image successfully pushed to ACR"
          echo "Image: ${{ secrets.ACR_LOGIN_SERVER_JOSH }}/${{ env.IMAGE_NAME }}:latest"
          echo "Commit: ${{ github.sha }}"
