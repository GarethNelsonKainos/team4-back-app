name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: academyacrj3r5dv
  ACR_LOGIN_SERVER: academyacrj3r5dv.azurecr.io
  ACR_REPOSITORY: team4-back-app-cameron
  TF_WORKING_DIR: terraform
  TF_VAR_environment: dev
  TF_VAR_project_name: team4-back-app

jobs:
  test:
    name: Test & Quality
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Run Biome checks
        run: npm run ci:check

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage/

  build-image:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            team4-back-app:${{ steps.vars.outputs.image_tag }}
            team4-back-app:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    env:
      TF_IN_AUTOMATION: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_CAMERON }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_CAMERON }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_CAMERON }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAMERON }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_CAMERON }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET_CAMERON }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_CAMERON }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAMERON }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform fmt check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan

  terraform-deploy:
    name: Terraform Deploy (main, dev)
    runs-on: ubuntu-latest
    needs: [test, publish-acr]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      TF_IN_AUTOMATION: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_CAMERON }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_CAMERON }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_CAMERON }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAMERON }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ secrets.AZURE_CLIENT_ID_CAMERON }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET_CAMERON }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_CAMERON }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAMERON }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

  publish-acr:
    name: Publish to ACR (main only)
    runs-on: ubuntu-latest
    needs: [test, build-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ secrets.AZURE_CLIENT_ID_CAMERON }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET_CAMERON }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_CAMERON }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_CAMERON }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tags
        id: vars
        run: |
          echo "image_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:sha-${{ steps.vars.outputs.image_sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:main-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify push output
        run: 'echo "Pushed image digest: ${{ steps.push.outputs.digest }}"'

     

