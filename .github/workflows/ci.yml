name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: academyacrj3r5dv
  ACR_LOGIN_SERVER: academyacrj3r5dv.azurecr.io
  ACR_REPOSITORY: team4-back-app-cameron
  TF_WORKING_DIR: terraform
  TF_VAR_environment: dev
  TF_VAR_project_name: team4-back-app

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Biome checks
        run: npm run ci:check

      - name: Typecheck
        run: npx tsc --noEmit

  tests:
    name: Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage/

  build-image:
    name: Build Container
    runs-on: ubuntu-latest
    needs: [quality, tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: |
            team4-back-app:${{ steps.vars.outputs.image_tag }}
            team4-back-app:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-postgres-image:
    name: Build Postgres Container
    runs-on: ubuntu-latest
    needs: [quality, tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Postgres Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.postgres
          push: false
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: |
            team4-postgres:${{ steps.vars.outputs.image_tag }}
            team4-postgres:ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  

  publish-app-acr:
    name: Publish App Image to ACR (main only)
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ format('{{"clientId":"{0}","clientSecret":"{1}","subscriptionId":"{2}","tenantId":"{3}"}}', secrets.AZURE_CLIENT_ID_CAMERON, secrets.AZURE_CLIENT_SECRET_CAMERON, secrets.AZURE_SUBSCRIPTION_ID_CAMERON, secrets.AZURE_TENANT_ID_CAMERON) }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tags
        id: vars
        run: |
          echo "image_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push app image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:sha-${{ steps.vars.outputs.image_sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:main-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify push output
        run: 'echo "Pushed app image digest: ${{ steps.push.outputs.digest }}"'

  publish-postgres-acr:
    name: Publish Postgres Image to ACR (main only)
    runs-on: ubuntu-latest
    needs: build-postgres-image
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ format('{{"clientId":"{0}","clientSecret":"{1}","subscriptionId":"{2}","tenantId":"{3}"}}', secrets.AZURE_CLIENT_ID_CAMERON, secrets.AZURE_CLIENT_SECRET_CAMERON, secrets.AZURE_SUBSCRIPTION_ID_CAMERON, secrets.AZURE_TENANT_ID_CAMERON) }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tags
        id: vars
        run: |
          echo "image_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push postgres image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.postgres
          push: true
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/team4-postgres:latest
            ${{ env.ACR_LOGIN_SERVER }}/team4-postgres:sha-${{ steps.vars.outputs.image_sha }}
            ${{ env.ACR_LOGIN_SERVER }}/team4-postgres:main-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify push output
        run: 'echo "Pushed postgres image digest: ${{ steps.push.outputs.digest }}"'

     

