services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PRISMA_DISABLE_TLS_VERIFY: "1"
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      API_PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/team4?schema=public"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "placeholder"
      AWS_SECRET_ACCESS_KEY: "placeholder"
      S3_BUCKET_NAME: "placeholder"
      JWT_SECRET: "your-secret-key"
      SALT_ROUNDS: "10"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
